<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEIC 模擬測驗</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --bg2: #111827;
      --bg3: #1a2235;
      --border: #1e3a5f;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --accent3: #10b981;
      --danger: #ef4444;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .logo-text { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; }
    .logo-text span { color: var(--accent); }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .score-display {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 0.88rem;
      color: var(--text2);
    }
    .score-display b { color: var(--accent); }
    .timer-display {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 0.88rem;
      color: var(--text2);
      font-variant-numeric: tabular-nums;
      display: none;
    }
    .timer-display b { color: #fbbf24; }

    /* ── MAIN ── */
    main { max-width: 900px; margin: 0 auto; padding: 32px 16px 80px; }

    /* ── HOME SCREEN ── */
    #homeScreen { text-align: center; padding: 60px 20px; }
    .hero-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub { color: var(--text2); font-size: 1rem; margin-bottom: 48px; }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .mode-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      text-align: left;
    }
    .mode-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,212,255,0.12);
    }
    .mode-icon { font-size: 2rem; margin-bottom: 12px; }
    .mode-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .mode-desc { font-size: 0.85rem; color: var(--text2); line-height: 1.6; }
    .mode-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-full { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.3); }
    .badge-quick { background: rgba(16,185,129,0.1); color: var(--accent3); border: 1px solid rgba(16,185,129,0.3); }
    .badge-custom { background: rgba(124,58,237,0.1); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }

    /* ── QUICK SETTINGS ── */
    #quickSettings {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
      display: none;
    }
    #quickSettings h2 {
      font-size: 0.8rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
    }
    .field label {
      display: block;
      font-size: 0.8rem;
      color: var(--text2);
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field select, .field input {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.92rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      appearance: auto;
    }
    .field select:focus, .field input:focus {
      border-color: var(--accent);
    }

    /* ── BUTTONS ── */
    .btn {
      padding: 11px 24px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, var(--accent2));
      color: white;
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      font-size: 1rem;
      letter-spacing: 0.03em;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ── PART HEADER ── */
    .part-header {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .part-number {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent);
      font-family: monospace;
      line-height: 1;
    }
    .part-info h3 { font-size: 1rem; font-weight: 700; margin-bottom: 3px; }
    .part-info p { font-size: 0.83rem; color: var(--text2); }
    .part-progress {
      margin-left: auto;
      text-align: right;
      font-size: 0.83rem;
      color: var(--text2);
    }
    .part-progress b { color: var(--text); font-size: 1rem; }

    /* ── PROGRESS BAR ── */
    .progress-bar-wrap {
      background: var(--bg3);
      border-radius: 4px;
      height: 4px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    /* ── LOADING ── */
    .loading-screen {
      text-align: center;
      padding: 80px 20px;
    }
    .loading-screen .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .loading-screen p { color: var(--text2); font-size: 0.9rem; }
    .loading-log {
      margin-top: 24px;
      text-align: left;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }
    .log-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg3);
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: var(--text2);
    }
    .log-item.done { color: var(--accent3); }
    .log-item.active { color: var(--accent); }
    .log-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0;
    }
    .log-item.done .log-dot { background: var(--accent3); }
    .log-item.active .log-dot {
      background: var(--accent);
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── PASSAGE BLOCK ── */
    .passage-block {
      background: var(--bg2);
      border: 1px solid var(--accent2);
      border-left: 4px solid var(--accent2);
      border-radius: 14px;
      padding: 24px 28px;
      margin-bottom: 8px;
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
    }
    .passage-label {
      font-size: 0.75rem;
      color: var(--accent2);
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── MULTI-PASSAGE（雙篇/三篇）── */
    .multi-passage-wrap {
      margin-bottom: 8px;
    }
    .multi-passage-header {
      font-size: 0.72rem;
      color: var(--accent3);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding: 4px 10px;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 6px;
      display: inline-block;
    }
    .multi-passage-doc {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 10px;
      font-size: 0.93rem;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      position: relative;
    }

    /* ── PASSAGE TABLE ── */
    .passage-table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 0.88rem;
      white-space: normal;
    }
    .passage-table th {
      background: var(--bg3);
      color: var(--accent);
      font-weight: 600;
      padding: 7px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .passage-table td {
      padding: 6px 12px;
      border: 1px solid var(--border);
      text-align: left;
      color: var(--text);
    }
    .passage-table tr:nth-child(even) td {
      background: rgba(255,255,255,0.02);
    }
    .multi-passage-doc:last-child { margin-bottom: 0; }
    .doc-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }
    .doc-label-1 { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.25); }
    .doc-label-2 { background: rgba(124,58,237,0.1); color: #a78bfa; border: 1px solid rgba(124,58,237,0.25); }
    .doc-label-3 { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }

    /* ── QUESTION CARD ── */
    .question-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

    .q-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .q-num {
      font-size: 0.78rem;
      color: var(--text3);
      margin-left: auto;
      font-variant-numeric: tabular-nums;
    }
    .tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .tag-p5 { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.25); }
    .tag-p6 { background: rgba(124,58,237,0.1); color: #a78bfa; border: 1px solid rgba(124,58,237,0.25); }
    .tag-p7 { background: rgba(16,185,129,0.1); color: var(--accent3); border: 1px solid rgba(16,185,129,0.25); }
    .tag-easy { background: rgba(16,185,129,0.1); color: var(--accent3); }
    .tag-medium { background: rgba(251,191,36,0.1); color: #fbbf24; }
    .tag-hard { background: rgba(239,68,68,0.1); color: var(--danger); }

    .q-passage {
      background: var(--bg2);
      border-left: 3px solid var(--accent2);
      border-radius: 0 8px 8px 0;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 0.92rem;
      line-height: 1.8;
      color: var(--text2);
      white-space: pre-wrap;
    }

    .q-text {
      font-size: 1.02rem;
      line-height: 1.75;
      margin-bottom: 20px;
      color: var(--text);
    }

    .choices { display: flex; flex-direction: column; gap: 9px; }
    .choice-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text);
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(0,212,255,0.05);
    }
    .choice-label {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 0.82rem;
      flex-shrink: 0;
      transition: all 0.15s;
      color: var(--text2);
    }
    .choice-btn.correct { border-color: var(--accent3); background: rgba(16,185,129,0.07); }
    .choice-btn.correct .choice-label { background: var(--accent3); color: #fff; border-color: var(--accent3); }
    .choice-btn.wrong { border-color: var(--danger); background: rgba(239,68,68,0.07); }
    .choice-btn.wrong .choice-label { background: var(--danger); color: #fff; border-color: var(--danger); }
    .choice-btn:disabled { cursor: default; }

    .result-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .result-correct { color: var(--accent3); }
    .result-wrong { color: var(--danger); }

    .explanation {
      margin-top: 16px;
      padding: 16px;
      background: var(--bg2);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      font-size: 0.88rem;
      line-height: 1.75;
      color: var(--text2);
      white-space: pre-wrap;
    }
    .explanation-title {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .grammar-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 3px 10px;
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 20px;
      font-size: 0.75rem;
      color: #a78bfa;
    }

    /* ── RESULT SCREEN ── */
    #resultScreen { display: none; text-align: center; padding: 60px 20px; }
    .result-circle {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0%, var(--accent2) var(--pct), var(--bg3) var(--pct));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      position: relative;
    }
    .result-circle::before {
      content: '';
      width: 110px; height: 110px;
      border-radius: 50%;
      background: var(--bg);
      position: absolute;
    }
    .result-score { position: relative; z-index: 1; }
    .result-score .big { font-size: 2rem; font-weight: 900; color: var(--accent); }
    .result-score .small { font-size: 0.8rem; color: var(--text2); }
    .result-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
    .result-sub { color: var(--text2); margin-bottom: 32px; }
    .result-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 480px;
      margin: 0 auto 32px;
    }
    .stat-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .stat-box .val { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .stat-box .lbl { font-size: 0.78rem; color: var(--text2); margin-top: 4px; }

    /* ── NAV BOTTOM ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      display: none;
      justify-content: space-between;
      align-items: center;
      z-index: 50;
    }
    .bottom-nav.visible { display: flex; }
    .nav-info { font-size: 0.85rem; color: var(--text2); }
    .nav-info b { color: var(--text); }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">📝</div>
    <div class="logo-text">TOEIC <span>Pro</span></div>
  </div>
  <div class="header-right">
    <div class="timer-display" id="timerDisplay">⏱ <b id="timerVal">75:00</b></div>
    <div class="score-display">答對 <b id="scoreVal">0</b> / <b id="totalVal">0</b></div>
    <button class="btn btn-outline" onclick="goHome()" style="padding:6px 14px;font-size:0.83rem;">← 返回</button>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- HOME -->
  <div id="homeScreen">
    <div class="hero-title">TOEIC Reading</div>
    <div class="hero-sub">AI 智能出題 × 講義 RAG 檢索 × 即時解析</div>

    <div class="mode-grid">
      <div class="mode-card" onclick="startFullTest()">
        <div class="mode-icon">🏆</div>
        <div class="mode-title">全真模擬測驗</div>
        <div class="mode-desc">Part 5（30題）+ Part 6（16題）+ Part 7（54題）<br>完整模擬真實 TOEIC 閱讀測驗</div>
        <span class="mode-badge badge-full">100 題 · 75 分鐘</span>
      </div>
      <div class="mode-card" onclick="showQuickMode()">
        <div class="mode-icon">⚡</div>
        <div class="mode-title">快速練習</div>
        <div class="mode-desc">自選題型、難度、題數，快速針對弱點練習</div>
        <span class="mode-badge badge-quick">自訂題數</span>
      </div>
    </div>

    <!-- Quick settings -->
    <div id="quickSettings">
      <h2>快速練習設定</h2>
      <div class="settings-grid">
        <div class="field">
          <label>題型</label>
          <select id="questionType" onchange="onTypeChange()">
            <option value="incomplete_sentence">不完整句子 (Part 5)</option>
            <option value="text_completion">短文填空 (Part 6)</option>
            <option value="reading">閱讀理解 (Part 7)</option>
          </select>
        </div>
        <div class="field" id="subtypeField" style="display:none">
          <label>文章篇數</label>
          <select id="part7Subtype" onchange="onSubtypeChange()">
            <option value="single">單篇</option>
            <option value="double">雙篇（5題）</option>
            <option value="triple">三篇（5題）</option>
          </select>
        </div>
        <div class="field">
          <label>難度</label>
          <select id="difficulty">
            <option value="easy">簡單</option>
            <option value="medium" selected>中等</option>
            <option value="hard">困難</option>
          </select>
        </div>
        <div class="field" id="countField">
          <label>題數 (1–30)</label>
          <input type="number" id="count" value="5" min="1" max="30" />
        </div>
      </div>
      <button class="btn btn-primary" id="generateBtn" onclick="startQuick()">⚡ 開始練習</button>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loadingScreen" style="display:none">
    <div class="loading-screen">
      <div class="spinner"></div>
      <h3 id="loadingTitle">AI 正在生成題目...</h3>
      <p id="loadingDesc">請稍候，正在從講義中檢索相關段落</p>
      <div class="loading-log" id="loadingLog"></div>
    </div>
  </div>

  <!-- QUESTIONS -->
  <div id="questionsScreen" style="display:none">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
    <div id="questionsArea"></div>
  </div>

  <!-- RESULT -->
  <div id="resultScreen">
    <div class="result-circle" id="resultCircle">
      <div class="result-score">
        <div class="big" id="resultPct">0%</div>
        <div class="small">正確率</div>
      </div>
    </div>
    <div class="result-title" id="resultTitle">測驗完成！</div>
    <div class="result-sub" id="resultSub"></div>
    <div class="result-stats">
      <div class="stat-box">
        <div class="val" id="statCorrect">0</div>
        <div class="lbl">答對</div>
      </div>
      <div class="stat-box">
        <div class="val" id="statWrong">0</div>
        <div class="lbl">答錯</div>
      </div>
      <div class="stat-box">
        <div class="val" id="statTotal">0</div>
        <div class="lbl">總題數</div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="goHome()" style="max-width:280px;margin:0 auto">再來一次</button>
  </div>

</main>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav">
  <div class="nav-info">已答 <b id="navAnswered">0</b> / <b id="navTotal">0</b> 題</div>
  <button class="btn btn-primary" style="width:auto;padding:10px 28px;margin:0" onclick="finishTest()">
    結束測驗 →
  </button>
</div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8002' : '';
let correctCount = 0, totalAnswered = 0, totalQuestions = 0;
let _questions = [];
let timerInterval = null;

function updateScore() {
  document.getElementById('scoreVal').textContent = correctCount;
  document.getElementById('totalVal').textContent = totalAnswered;
  document.getElementById('navAnswered').textContent = totalAnswered;
  document.getElementById('navTotal').textContent = totalQuestions;
  const pct = totalQuestions > 0 ? Math.round(totalAnswered / totalQuestions * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function goHome() {
  stopTimer();
  show('homeScreen');
  hide('loadingScreen');
  hide('questionsScreen');
  hide('resultScreen');
  document.getElementById('bottomNav').classList.remove('visible');
  document.getElementById('timerDisplay').style.display = 'none';
  correctCount = 0; totalAnswered = 0; totalQuestions = 0; _questions = [];
  updateScore();
}

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function showQuickMode() {
  const el = document.getElementById('quickSettings');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ── 計時器 ──
function startTimer(seconds) {
  const disp = document.getElementById('timerDisplay');
  const val = document.getElementById('timerVal');
  disp.style.display = 'block';
  let remaining = seconds;
  function tick() {
    const m = String(Math.floor(remaining / 60)).padStart(2, '0');
    const s = String(remaining % 60).padStart(2, '0');
    val.textContent = `${m}:${s}`;
    if (remaining <= 300) val.style.color = '#ef4444';
    if (remaining <= 0) { stopTimer(); finishTest(); }
    remaining--;
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ── API 呼叫 ──
async function fetchQuestions(params) {
  const res = await fetch(`${API}/generate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(params),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.questions;
}

// ── 快速練習 ──
async function startQuick() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  hide('homeScreen');
  show('loadingScreen');
  document.getElementById('loadingTitle').textContent = 'AI 正在生成題目...';
  document.getElementById('loadingDesc').textContent = '正在從講義檢索相關段落';

  try {
    const qtype = document.getElementById('questionType').value;
    const subtype = qtype === 'reading' ? document.getElementById('part7Subtype').value : null;
    // Part 7 題數自動決定：single=9題(約3-4篇)，double/triple=5題(1組)
    const p7count = { single: 9, double: 5, triple: 5 };
    const count = qtype === 'reading'
      ? p7count[subtype] || 9
      : Math.min(30, parseInt(document.getElementById('count').value) || 5);
    const params = {
      question_type: qtype,
      difficulty: document.getElementById('difficulty').value,
      toeic_part: { incomplete_sentence: 5, text_completion: 6, reading: 7, grammar: 5, vocabulary: 5 }[qtype] || 5,
      count,
      use_rag: true,
    };
    if (subtype) params.part7_subtype = subtype;

    const qs = await fetchQuestions(params);
    _questions = qs;
    totalQuestions = qs.length;
    hide('loadingScreen');
    show('questionsScreen');
    document.getElementById('bottomNav').classList.add('visible');
    renderAllQuestions(qs);
    updateScore();
  } catch(e) {
    hide('loadingScreen');
    show('homeScreen');
    alert('生成失敗：' + e.message);
  } finally {
    btn.disabled = false;
  }
}

// ── 全真模擬 ──
async function startFullTest() {
  hide('homeScreen');
  show('loadingScreen');

  const log = document.getElementById('loadingLog');
  document.getElementById('loadingTitle').textContent = '正在生成全真模擬測驗...';
  document.getElementById('loadingDesc').textContent = '共需生成 100 題，請稍候約 30–60 秒';

  const sections = [
    { label: 'Part 5 — 不完整句子 (1–15)',    type: 'incomplete_sentence', part: 5, count: 15, diff: 'medium', subtype: null },
    { label: 'Part 5 — 不完整句子 (16–30)',   type: 'incomplete_sentence', part: 5, count: 15, diff: 'hard',   subtype: null },
    { label: 'Part 6 — 短文填空 第1篇',        type: 'text_completion',     part: 6, count: 4,  diff: 'medium', subtype: null },
    { label: 'Part 6 — 短文填空 第2篇',        type: 'text_completion',     part: 6, count: 4,  diff: 'medium', subtype: null },
    { label: 'Part 6 — 短文填空 第3篇',        type: 'text_completion',     part: 6, count: 4,  diff: 'hard',   subtype: null },
    { label: 'Part 6 — 短文填空 第4篇',        type: 'text_completion',     part: 6, count: 4,  diff: 'hard',   subtype: null },
    { label: 'Part 7 — 單篇閱讀 第1批',        type: 'reading',             part: 7, count: 10, diff: 'medium', subtype: 'single' },
    { label: 'Part 7 — 單篇閱讀 第2批',        type: 'reading',             part: 7, count: 9,  diff: 'medium', subtype: 'single' },
    { label: 'Part 7 — 單篇閱讀 第3批',        type: 'reading',             part: 7, count: 10, diff: 'hard',   subtype: 'single' },
    { label: 'Part 7 — 雙篇閱讀 第1組（5題）', type: 'reading',             part: 7, count: 5,  diff: 'hard',   subtype: 'double' },
    { label: 'Part 7 — 雙篇閱讀 第2組（5題）', type: 'reading',             part: 7, count: 5,  diff: 'hard',   subtype: 'double' },
    { label: 'Part 7 — 三篇閱讀 第1組（5題）', type: 'reading',             part: 7, count: 5,  diff: 'hard',   subtype: 'triple' },
    { label: 'Part 7 — 三篇閱讀 第2組（5題）', type: 'reading',             part: 7, count: 5,  diff: 'hard',   subtype: 'triple' },
    { label: 'Part 7 — 三篇閱讀 第3組（5題）', type: 'reading',             part: 7, count: 5,  diff: 'hard',   subtype: 'triple' },
  ];

  // 建立 log 項目
  log.innerHTML = sections.map((s, i) =>
    `<div class="log-item" id="log${i}"><div class="log-dot"></div>${s.label}</div>`
  ).join('');

  let allQuestions = [];
  try {
    for (let i = 0; i < sections.length; i++) {
      document.getElementById(`log${i}`).className = 'log-item active';
      const s = sections[i];
      const qs = await fetchQuestions({
        question_type: s.type,
        toeic_part: s.part,
        count: s.count,
        difficulty: s.diff,
        part7_subtype: s.subtype || null,
        use_rag: true,
      });
      allQuestions = allQuestions.concat(qs);
      document.getElementById(`log${i}`).className = 'log-item done';
      document.getElementById(`log${i}`).querySelector('.log-dot').textContent = '✓';
    }

    _questions = allQuestions;
    totalQuestions = allQuestions.length;
    hide('loadingScreen');
    show('questionsScreen');
    document.getElementById('bottomNav').classList.add('visible');
    renderFullTest(allQuestions);
    startTimer(75 * 60);
    updateScore();
  } catch(e) {
    hide('loadingScreen');
    show('homeScreen');
    alert('生成失敗：' + e.message);
  }
}

// ── 渲染：全真模擬（含 Part 標題）──
function renderFullTest(questions) {
  const area = document.getElementById('questionsArea');
  area.innerHTML = '';

  const parts = [
    { part: 5, label: 'Part 5', desc: '不完整句子 — 從選項中選出最適合填入空格的詞語', qs: questions.filter(q => q.toeic_part === 5) },
    { part: 6, label: 'Part 6', desc: '短文填空 — 閱讀文章並選出最適合填入空格的詞語', qs: questions.filter(q => q.toeic_part === 6) },
    { part: 7, label: 'Part 7', desc: '閱讀理解 — 閱讀文章並回答相關問題', qs: questions.filter(q => q.toeic_part === 7) },
  ];

  // TOEIC 題號從 101 開始
  const partStartNum = { 5: 101, 6: 131, 7: 147 };
  parts.forEach(p => {
    if (p.qs.length === 0) return;
    const num = partStartNum[p.part] || 101;
    const endNum = num + p.qs.length - 1;
    const header = document.createElement('div');
    header.className = 'part-header';
    header.innerHTML = `
      <div class="part-number">${p.label}</div>
      <div class="part-info">
        <h3>${p.desc}</h3>
        <p>第 ${num}–${endNum} 題，共 ${p.qs.length} 題</p>
      </div>
      <div class="part-progress"><b>${p.qs.length}</b> 題</div>
    `;
    area.appendChild(header);
    renderWithPassages(p.qs, area, num);
  });
}

// ── 題型改變時調整題數 ──
function onTypeChange() {
  const type = document.getElementById('questionType').value;
  const countEl = document.getElementById('count');
  const countField = document.getElementById('countField');
  const countLabel = countField.querySelector('label');
  const subtypeField = document.getElementById('subtypeField');

  if (type === 'reading') {
    subtypeField.style.display = 'block';
    countField.style.display = 'none';   // Part 7：隱藏題數
    onSubtypeChange();
  } else if (type === 'text_completion') {
    subtypeField.style.display = 'none';
    countField.style.display = 'block';
    countEl.value = 4;
    countEl.disabled = true;
    countLabel.textContent = '題數（固定4題/篇）';
  } else {
    subtypeField.style.display = 'none';
    countField.style.display = 'block';
    countEl.disabled = false;
    countLabel.textContent = '題數 (1–30)';
  }
}

function onSubtypeChange() {
  // Part 7 題數由系統決定，不需要顯示
}

// ── 取得分組 key ──
function passageKey(q) {
  if (q.passages && q.passages.length > 0) return JSON.stringify(q.passages);
  return q.passage || null;
}

// ── 將題目依 passage 分組 ──
function groupByPassage(questions) {
  const groups = [];
  let prevKey = undefined;
  let lastPassagesGroup = null;
  for (const q of questions) {
    const key = passageKey(q);
    // Part 6：連續題目歸入同一群組（Gemini 可能為每題產生略有不同的 passage）
    if (q.toeic_part === 6 && groups.length > 0 && groups[groups.length - 1].qs[0].toeic_part === 6) {
      groups[groups.length - 1].qs.push(q);
      prevKey = key;
      continue;
    }
    // double/triple 但 passages 已被後端去重複 → 歸入上一個 passages 群組
    if (!key && q.part7_subtype && (q.part7_subtype === 'double' || q.part7_subtype === 'triple')
        && lastPassagesGroup && lastPassagesGroup.subtype === q.part7_subtype) {
      lastPassagesGroup.qs.push(q);
      continue;
    }
    if (key && key === prevKey) {
      groups[groups.length - 1].qs.push(q);
    } else {
      const group = {
        passage: q.passage || null,
        passages: q.passages || null,
        subtype: q.part7_subtype || null,
        qs: [q],
      };
      groups.push(group);
      if (q.passages && q.passages.length > 0) lastPassagesGroup = group;
    }
    prevKey = key;
  }
  return groups;
}

// ── 渲染：快速練習 ──
function renderAllQuestions(questions) {
  const area = document.getElementById('questionsArea');
  area.innerHTML = '';
  renderWithPassages(questions, area, 1);
}

// ── 渲染含 passage 分組（共用）──
function renderWithPassages(questions, container, startNum) {
  const groups = groupByPassage(questions);
  let num = startNum;
  for (const group of groups) {
    if (group.passages && group.passages.length > 0) {
      // 雙篇 / 三篇
      const docLabels = ['Document 1', 'Document 2', 'Document 3'];
      const subtypeLabel = group.subtype === 'triple' ? '三篇閱讀' : '雙篇閱讀';
      const wrap = document.createElement('div');
      wrap.className = 'multi-passage-wrap';
      wrap.innerHTML = `<div class="multi-passage-header">${subtypeLabel} — Questions ${num}–${num + group.qs.length - 1}</div>`;
      group.passages.forEach((p, i) => {
        const docEl = document.createElement('div');
        docEl.className = 'multi-passage-doc';
        docEl.innerHTML = `<div class="doc-label doc-label-${i+1}">${docLabels[i]}</div>${renderPassageText(p)}`;
        wrap.appendChild(docEl);
      });
      container.appendChild(wrap);
    } else if (group.passage) {
      // 單篇
      const firstQ = group.qs[0];
      const partTag = { 5: 'tag-p5', 6: 'tag-p6', 7: 'tag-p7' }[firstQ.toeic_part] || 'tag-p5';
      const diffTag = { easy: 'tag-easy', medium: 'tag-medium', hard: 'tag-hard' }[firstQ.difficulty] || '';
      const diffLabel = { easy: '簡單', medium: '中等', hard: '困難' }[firstQ.difficulty] || '';
      const numLabel = group.qs.length > 1 ? `第 ${num}–${num + group.qs.length - 1} 題` : `第 ${num} 題`;
      const block = document.createElement('div');
      block.className = 'passage-block';
      block.innerHTML = `<div class="passage-label"><span style="font-size:0.8rem;color:var(--text3);">${numLabel}</span>閱讀文章<span class="tag ${partTag}" style="font-size:0.7rem;padding:2px 8px;">Part ${firstQ.toeic_part}</span><span class="tag ${diffTag}" style="font-size:0.7rem;padding:2px 8px;">${diffLabel}</span></div>${renderPassageText(group.passage)}`;
      container.appendChild(block);
    }
    for (const q of group.qs) {
      renderQuestion(q, num++, container);
    }
  }
  return num;
}

// ── 渲染單題 ──
function renderQuestion(q, num, container) {
  const partTag = { 5: 'tag-p5', 6: 'tag-p6', 7: 'tag-p7' }[q.toeic_part] || 'tag-p5';
  const diffTag = { easy: 'tag-easy', medium: 'tag-medium', hard: 'tag-hard' }[q.difficulty] || '';
  const diffLabel = { easy: '簡單', medium: '中等', hard: '困難' }[q.difficulty] || '';

  const card = document.createElement('div');
  card.className = 'question-card';
  card.innerHTML = `
    ${(q.toeic_part === 5 || q.toeic_part === 6) ? '' : `<div class="q-text">${q.question.replace(/\n/g, '<br>')}</div>`}
    <div class="choices" id="choices-${q.id}">
      ${q.choices.map(c => `
        <button class="choice-btn" onclick="answer('${q.id}','${c.label}','${q.correct_answer}',this)"
                data-label="${c.label}">
          <span class="choice-label">${c.label}</span>
          <span>${escHtml(c.text)}</span>
        </button>
      `).join('')}
    </div>
    <div id="result-${q.id}"></div>
    <div id="expl-${q.id}"></div>
  `;
  container.appendChild(card);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Markdown table → HTML table ──
function renderPassageText(text) {
  const lines = text.split('\n');
  let html = '';
  let i = 0;
  while (i < lines.length) {
    if (lines[i].trim().startsWith('|')) {
      // Collect table block
      const tableLines = [];
      while (i < lines.length && lines[i].trim().startsWith('|')) {
        tableLines.push(lines[i]);
        i++;
      }
      // Filter separator rows (|---|---|) — only rows where every cell is purely dashes/colons
      const isSep = l => {
        const inner = l.trim().replace(/^\||\|$/g, '');
        const cells = inner.split('|');
        return cells.length > 0 && cells.every(c => /^\s*:?-+:?\s*$/.test(c));
      };
      const dataRows = tableLines.filter(l => !isSep(l));
      if (dataRows.length > 0) {
        html += '<table class="passage-table">';
        dataRows.forEach((row, idx) => {
          const cells = row.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
          if (idx === 0) {
            html += '<thead><tr>' + cells.map(c => `<th>${escHtml(c)}</th>`).join('') + '</tr></thead><tbody>';
          } else {
            html += '<tr>' + cells.map(c => `<td>${escHtml(c)}</td>`).join('') + '</tr>';
          }
        });
        html += '</tbody></table>';
      }
    } else {
      html += escHtml(lines[i]) + '<br>';
      i++;
    }
  }
  return html;
}

// ── 作答 ──
function answer(qid, chosen, correct, btn) {
  const choicesEl = document.getElementById(`choices-${qid}`);
  if (!choicesEl) return;
  choicesEl.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.label === correct) b.classList.add('correct');
  });
  const isCorrect = chosen === correct;
  if (!isCorrect) btn.classList.add('wrong');

  totalAnswered++;
  if (isCorrect) correctCount++;
  updateScore();

  document.getElementById(`result-${qid}`).innerHTML = `
    <div class="result-row">
      <span class="${isCorrect ? 'result-correct' : 'result-wrong'}">
        ${isCorrect ? '✅ 正確！' : `❌ 答錯，正確答案是 <b>${correct}</b>`}
      </span>
    </div>
  `;

  const q = _questions.find(x => x.id === qid);
  if (q && q.explanation) {
    document.getElementById(`expl-${qid}`).innerHTML = `
      <div class="explanation">
        <div class="explanation-title">解析</div>
        ${escHtml(q.explanation)}
        ${q.grammar_point ? `<div class="grammar-badge">📌 ${escHtml(q.grammar_point)}</div>` : ''}
      </div>
    `;
  }
}

// ── 結束測驗 ──
function finishTest() {
  stopTimer();
  hide('questionsScreen');
  document.getElementById('bottomNav').classList.remove('visible');
  document.getElementById('timerDisplay').style.display = 'none';

  const pct = totalQuestions > 0 ? Math.round(correctCount / totalQuestions * 100) : 0;
  const wrong = totalAnswered - correctCount;
  const unanswered = totalQuestions - totalAnswered;

  document.getElementById('resultPct').textContent = pct + '%';
  document.getElementById('resultCircle').style.setProperty('--pct', pct + '%');
  document.getElementById('resultTitle').textContent = pct >= 80 ? '優秀！' : pct >= 60 ? '不錯！' : '繼續加油！';
  document.getElementById('resultSub').textContent = `答對 ${correctCount} 題，答錯 ${wrong} 題，未作答 ${unanswered} 題`;
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statTotal').textContent = totalQuestions;

  show('resultScreen');
}
</script>
</body>
</html>
